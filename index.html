<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENAM RA</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
.box{
  margin-top:40px;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
input{
  padding:5px;
  border-radius:5px;
  border:none;
  margin:5px;
}
#countdown{
  font-size:18px;
  font-weight:bold;
  margin-top:15px;
}
</style>
</head>
<body>

<h1>🏥 ENAM RA</h1>

<div class="box">
<h3>Configuración Semana</h3>

Tareas (8-12):
<input type="number" id="taskNumber" min="8" max="12" value="10">

<br><br>

Fecha y hora límite:
<input type="datetime-local" id="deadlineInput">

<br><br>

<button onclick="startGame()">Iniciar Semana</button>

<p id="status"></p>
<p id="countdown"></p>

</div>

<script>

let timer;
let deadlineTime;
let active = false;

function startGame(){

let tasks = document.getElementById("taskNumber").value;
let deadlineValue = document.getElementById("deadlineInput").value;

if(!deadlineValue){
alert("Selecciona fecha y hora límite");
return;
}

deadlineTime = new Date(deadlineValue).getTime();
active = true;

document.getElementById("status").innerText =
"Semana iniciada con " + tasks + " tareas.";

startCountdown();
}

function startCountdown(){

clearInterval(timer);

timer = setInterval(function(){

if(!active) return;

let now = new Date().getTime();
let distance = deadlineTime - now;

if(distance <= 0){

clearInterval(timer);
active = false;
document.getElementById("countdown").innerText = "⛔ Semana Terminada";

}else{

let days = Math.floor(distance / (1000 * 60 * 60 * 24));
let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
let seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("countdown").innerText =
"⏳ Tiempo restante: " +
days + "d " +
hours + "h " +
minutes + "m " +
seconds + "s";

}

},1000);
}

</script>

</body>
</html>
