<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENAM RA</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
.box{
  margin-top:50px;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
input{
  padding:5px;
  border-radius:5px;
  border:none;
  margin:5px;
}
</style>
</head>
<body>

<h1>🏥 ENAM RA</h1>

<div class="box">
<h3>Configuración Semana</h3>

Tareas (8-12):
<input type="number" id="taskNumber" min="8" max="12" value="10">

Deadline (minutos):
<input type="number" id="deadlineInput" value="60">

<br><br>

<button onclick="startGame()">Iniciar Semana</button>

<p id="status"></p>

</div>

<script>
function startGame(){
let tasks = document.getElementById("taskNumber").value;
let deadline = document.getElementById("deadlineInput").value;

document.getElementById("status").innerText =
"Semana iniciada con " + tasks + " tareas y " + deadline + " minutos.";
}
</script>

</body>
</html>
