<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENAM RA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1{
  margin-top:20px;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.box{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

button{
  padding:8px 15px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

input{
  padding:5px;
  border-radius:5px;
  border:none;
  margin:5px;
}

.task{
  text-align:left;
  margin:8px 0;
}

#countdown{
  font-weight:bold;
  margin-top:10px;
}

#progress{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🏥 ENAM RA</h1>

<div class="container">

<div class="box">

<h3>Configuración Semana</h3>

Tareas (8-12):
<input type="number" id="taskNumber" min="8" max="12" value="10">

<br><br>

Fecha y hora límite:
<input type="datetime-local" id="deadlineInput">

<br><br>

<button onclick="startGame()">Iniciar Semana</button>

<p id="status"></p>
<p id="countdown"></p>

</div>

<div class="box">
<h3>📋 Checklist ENAM</h3>
<div id="taskContainer"></div>
<p id="progress"></p>
</div>

</div>

<script>

let timer;
let deadlineTime;
let active = false;
let totalTasks = 0;
let completedTasks = 0;

function startGame(){

let tasks = parseInt(document.getElementById("taskNumber").value);
let deadlineValue = document.getElementById("deadlineInput").value;

if(!deadlineValue){
alert("Selecciona fecha y hora límite");
return;
}

totalTasks = tasks;
completedTasks = 0;

deadlineTime = new Date(deadlineValue).getTime();
active = true;

document.getElementById("status").innerText =
"Semana iniciada con " + tasks + " tareas.";

generateTasks();
startCountdown();
}

function generateTasks(){

let container = document.getElementById("taskContainer");
container.innerHTML = "";

for(let i=1; i<=totalTasks; i++){

let div = document.createElement("div");
div.className = "task";

div.innerHTML = `
<input type="checkbox" onchange="completeTask(this)">
 Tarea médica ${i}
`;

container.appendChild(div);
}

updateProgress();
}

function completeTask(checkbox){

if(!active){
checkbox.checked = false;
return;
}

checkbox.disabled = true;
completedTasks++;
updateProgress();
}

function updateProgress(){

document.getElementById("progress").innerText =
"Progreso: " + completedTasks + " / " + totalTasks;
}

function startCountdown(){

clearInterval(timer);

timer = setInterval(function(){

if(!active) return;

let now = new Date().getTime();
let distance = deadlineTime - now;

if(distance <= 0){

clearInterval(timer);
active = false;
document.getElementById("countdown").innerText = "⛔ Semana Terminada";

}else{

let days = Math.floor(distance / (1000 * 60 * 60 * 24));
let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
let seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("countdown").innerText =
"⏳ Tiempo restante: " +
days + "d " +
hours + "h " +
minutes + "m " +
seconds + "s";

}

},1000);
}

</script>

</body>
</html>
