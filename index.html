<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENAM RA</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1{ margin-top:20px; }

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.box{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

.board{
  margin-top:20px;
}

button{
  padding:6px 12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-left:5px;
}

input{
  padding:5px;
  border-radius:5px;
  border:none;
  margin:5px;
}

.task{
  text-align:left;
  margin:8px 0;
}

svg{
  background:#0f172a;
  border-radius:20px;
}

#progress{
  margin-top:10px;
  font-weight:bold;
}

.blue{ fill:#3b82f6; }
.white{ fill:white; }

</style>
</head>

<body>

<h1>🏥 ENAM RA</h1>

<div class="container">

<div class="box">
<h3>Configuración Semana</h3>

Tareas (8-12):
<input type="number" id="taskNumber" min="8" max="12" value="10">

<br><br>

Fecha y hora límite:
<input type="datetime-local" id="deadlineInput">

<br><br>

<button onclick="startGame()">Iniciar Semana</button>

<p id="countdown"></p>
</div>

<div class="box board">
<h3>🎲 Tablero</h3>
<svg id="board" width="400" height="400"></svg>
</div>

<div class="box">
<h3>📋 Checklist ENAM</h3>
<div id="taskContainer"></div>
<p id="progress"></p>
</div>

</div>

<script>

let timer;
let deadlineTime;
let active = false;
let totalTasks = 0;
let bluePosition = 0;
let whitePosition = 0;
let positions = [];

function startGame(){

let tasks = parseInt(document.getElementById("taskNumber").value);
let deadlineValue = document.getElementById("deadlineInput").value;

if(!deadlineValue){
alert("Selecciona fecha y hora límite");
return;
}

totalTasks = tasks;
bluePosition = 0;
whitePosition = 0;

deadlineTime = new Date(deadlineValue).getTime();
active = true;

generateSpiral();
generateTasks();
startCountdown();
}

function generateSpiral(){

const svg = document.getElementById("board");
svg.innerHTML = "";
positions = [];

const centerX = 200;
const centerY = 200;
let angle = 0;
let radius = 20;

for(let i=0; i<totalTasks; i++){

let x = centerX + radius * Math.cos(angle);
let y = centerY + radius * Math.sin(angle);

positions.push({x,y});

let circle = document.createElementNS("http://www.w3.org/2000/svg","circle");
circle.setAttribute("cx",x);
circle.setAttribute("cy",y);
circle.setAttribute("r",12);
circle.setAttribute("fill","#334155");
svg.appendChild(circle);

angle += Math.PI/4;
radius += 12;
}

drawPlayers();
}

function drawPlayers(){

const svg = document.getElementById("board");

let blue = document.createElementNS("http://www.w3.org/2000/svg","circle");
blue.setAttribute("cx",positions[0].x);
blue.setAttribute("cy",positions[0].y);
blue.setAttribute("r",8);
blue.setAttribute("class","blue");
blue.setAttribute("id","bluePlayer");

let white = document.createElementNS("http://www.w3.org/2000/svg","circle");
white.setAttribute("cx",positions[0].x);
white.setAttribute("cy",positions[0].y);
white.setAttribute("r",8);
white.setAttribute("class","white");
white.setAttribute("id","whitePlayer");

svg.appendChild(blue);
svg.appendChild(white);
}

function movePlayer(player){

if(!active) return;

if(player === "blue" && bluePosition < totalTasks-1){
bluePosition++;
}

if(player === "white" && whitePosition < totalTasks-1){
whitePosition++;
}

updatePlayers();
checkWinner();
updateProgress();
}

function updatePlayers(){

document.getElementById("bluePlayer")
.setAttribute("cx",positions[bluePosition].x);

document.getElementById("bluePlayer")
.setAttribute("cy",positions[bluePosition].y);

document.getElementById("whitePlayer")
.setAttribute("cx",positions[whitePosition].x);

document.getElementById("whitePlayer")
.setAttribute("cy",positions[whitePosition].y);
}

function checkWinner(){

if(bluePosition === totalTasks-1){
alert("🔵 Azul llegó a la meta 🏆");
active = false;
}

if(whitePosition === totalTasks-1){
alert("⚪ Blanco llegó a la meta 🏆");
active = false;
}
}

function generateTasks(){

let container = document.getElementById("taskContainer");
container.innerHTML = "";

for(let i=1; i<=totalTasks; i++){

let div = document.createElement("div");
div.className = "task";

div.innerHTML = `
<input type="checkbox" onchange="completeTask(this)">
 Tarea médica ${i}
 <button onclick="movePlayer('blue')">🔵</button>
 <button onclick="movePlayer('white')">⚪</button>
`;

container.appendChild(div);
}

updateProgress();
}

function completeTask(checkbox){

if(!active){
checkbox.checked = false;
return;
}

checkbox.disabled = true;
}

function updateProgress(){

document.getElementById("progress").innerText =
"🔵 " + bluePosition + " / " + totalTasks +
" | ⚪ " + whitePosition + " / " + totalTasks;
}

function startCountdown(){

clearInterval(timer);

timer = setInterval(function(){

if(!active) return;

let now = new Date().getTime();
let distance = deadlineTime - now;

if(distance <= 0){

clearInterval(timer);
active = false;
document.getElementById("countdown").innerText = "⛔ Semana Terminada";

if(bluePosition > whitePosition){
alert("🔵 Azul gana por estar más cerca 🏆");
}else if(whitePosition > bluePosition){
alert("⚪ Blanco gana por estar más cerca 🏆");
}else{
alert("🤝 Empate");
}

}else{

let days = Math.floor(distance / (1000 * 60 * 60 * 24));
let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
let seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("countdown").innerText =
"⏳ " + days + "d " + hours + "h " + minutes + "m " + seconds + "s";

}

},1000);
}

</script>

</body>
</html>
