<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ENAM RA - Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  font-family:Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
}
.box{
  background:#1e293b;
  padding:20px;
  margin:20px;
  border-radius:12px;
}
</style>
</head>
<body>

<h2>🏥 ENAM RA - Multijugador</h2>

<div class="box">
<h3>Selecciona tu jugador</h3>
<button onclick="setPlayer('blue')">🔵 Azul</button>
<button onclick="setPlayer('white')">⚪ Blanco</button>
<p id="playerInfo"></p>
</div>

<div class="box">
<h3>Avance</h3>
<button onclick="advance()">Avanzar 1</button>
<p id="status">Cargando...</p>
</div>

<script>

// 🔥 TU CONFIGURACIÓN SUPABASE
const supabase = window.supabase.createClient(
  "https://rktfqnlzmjlrjtfdcxiz.supabase.co",
  "sb_publishable_AeMFjsXhFm5jxmTWJaaWFA_hgIHS5JT"
);

let currentPlayer = null;

// Crear fila inicial si no existe
async function initGame(){
  const { data } = await supabase.from("game").select("*").eq("id",1);
  if(data.length === 0){
    await supabase.from("game").insert([{ id:1, blue:0, white:0 }]);
  }
}
initGame();

// Elegir jugador
function setPlayer(player){
  currentPlayer = player;
  document.getElementById("playerInfo").innerText = "Eres: " + (player === "blue" ? "🔵 Azul" : "⚪ Blanco");
}

// Avanzar
async function advance(){
  if(!currentPlayer){
    alert("Selecciona jugador primero");
    return;
  }

  const { data } = await supabase.from("game").select("*").eq("id",1);
  let blue = data[0].blue;
  let white = data[0].white;

  if(currentPlayer === "blue"){
    blue++;
  } else {
    white++;
  }

  await supabase.from("game").update({ blue, white }).eq("id",1);
}

// Escuchar cambios en tiempo real
supabase
.channel('realtime-game')
.on('postgres_changes',
  { event: '*', schema: 'public', table: 'game' },
  payload => {
    const game = payload.new;
    document.getElementById("status").innerText =
      "🔵 Azul: " + game.blue + " | ⚪ Blanco: " + game.white;
  }
)
.subscribe();

</script>

</body>
</html>
